<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM Competency Evaluator – Scenario</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="scenario.css" />
</head>
<body>
  <div class="scenario-shell">

    <!-- Close button -->
    <button class="close-btn" onclick="history.back()">✕</button>

    <!-- Top instruction banner -->
    <div class="instruction-banner">
      <p>If you were in the following situation, what should you respond or answer?</p>
    </div>

    <!-- Middle: illustration + situation -->
    <div class="scene-row">

      <!-- Left: illustration -->
      <div class="illustration-panel">
        <div class="nav-arrow left" id="prev-btn">&#8249;</div>
        <div class="illustration-frame">
          <svg id="scene-svg" viewBox="0 0 520 380" xmlns="http://www.w3.org/2000/svg">
            <!-- Room background -->
            <rect width="520" height="380" fill="#f5f0e8"/>
            <rect x="0" y="310" width="520" height="70" fill="#e8e0d0"/>
            <!-- Back wall -->
            <rect x="0" y="0" width="520" height="315" fill="#ede8dc"/>

            <!-- Table -->
            <rect x="100" y="230" width="200" height="12" rx="3" fill="#c8b89a"/>
            <rect x="110" y="242" width="8" height="65" fill="#b8a88a"/>
            <rect x="280" y="242" width="8" height="65" fill="#b8a88a"/>
            <!-- Laptop on table -->
            <rect x="140" y="195" width="90" height="58" rx="4" fill="#555"/>
            <rect x="144" y="199" width="82" height="48" rx="2" fill="#89c4e1"/>
            <!-- laptop screen bar chart -->
            <rect x="152" y="228" width="8" height="14" fill="#4a90d9"/>
            <rect x="164" y="220" width="8" height="22" fill="#4a90d9"/>
            <rect x="176" y="213" width="8" height="29" fill="#4a90d9"/>
            <rect x="188" y="206" width="8" height="36" fill="#4a90d9"/>
            <rect x="140" y="253" width="90" height="5" rx="2" fill="#444"/>
            <!-- Coffee cup -->
            <rect x="258" y="218" width="16" height="18" rx="3" fill="#d4a574"/>
            <path d="M274 224 Q282 224 282 231 Q282 238 274 238" stroke="#c89060" stroke-width="2" fill="none"/>

            <!-- Chart on wall -->
            <rect x="200" y="40" width="140" height="110" rx="4" fill="white" stroke="#ccc" stroke-width="1.5"/>
            <text x="215" y="58" font-size="9" fill="#333" font-family="sans-serif" font-weight="bold">Project Priority Chart</text>
            <!-- chart axes -->
            <line x1="218" y1="130" x2="218" y2="68" stroke="#666" stroke-width="1.5"/>
            <line x1="218" y1="130" x2="330" y2="130" stroke="#666" stroke-width="1.5"/>
            <text x="205" y="100" font-size="7" fill="#666" font-family="sans-serif" transform="rotate(-90,205,100)">Potential Revenue</text>
            <text x="248" y="142" font-size="7" fill="#666" font-family="sans-serif">Tech Debt Effort</text>
            <!-- bars -->
            <rect x="228" y="105" width="14" height="25" fill="#aaa"/>
            <rect x="248" y="92"  width="14" height="38" fill="#888"/>
            <rect x="268" y="78"  width="14" height="52" fill="#667eea"/>
            <rect x="288" y="68"  width="14" height="62" fill="#667eea"/>
            <!-- pointer arrow from VP -->
            <line x1="310" y1="90" x2="295" y2="90" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowhead)"/>
            <defs>
              <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
                <path d="M0,0 L6,3 L0,6 Z" fill="#c0392b"/>
              </marker>
            </defs>

            <!-- Product Manager (seated, left) -->
            <!-- body -->
            <ellipse cx="95" cy="195" rx="22" ry="30" fill="#d4a88a"/>
            <!-- head -->
            <circle cx="95" cy="155" r="20" fill="#f0c8a0"/>
            <!-- hair -->
            <ellipse cx="95" cy="140" rx="20" ry="10" fill="#5a3e28"/>
            <!-- label -->
            <text x="30" y="270" font-size="9" fill="#333" font-family="sans-serif" font-weight="bold">Product</text>
            <text x="30" y="281" font-size="9" fill="#333" font-family="sans-serif" font-weight="bold">Manager</text>
            <line x1="68" y1="270" x2="85" y2="195" stroke="#666" stroke-width="0.8" stroke-dasharray="3,2"/>

            <!-- VP of Sales (standing, center-right) -->
            <!-- body -->
            <rect x="320" y="165" width="44" height="80" rx="6" fill="#4a6fa5"/>
            <!-- tie -->
            <polygon points="342,168 346,168 347,210 342,215 337,210" fill="#c0392b"/>
            <!-- head -->
            <circle cx="342" cy="148" r="20" fill="#f0c8a0"/>
            <!-- hair -->
            <ellipse cx="342" cy="133" rx="20" ry="10" fill="#3a2a1a"/>
            <!-- pointing arm -->
            <line x1="320" y1="195" x2="270" y2="175" stroke="#4a6fa5" stroke-width="8" stroke-linecap="round"/>
            <!-- legs -->
            <rect x="323" y="245" width="16" height="55" rx="4" fill="#2c3e50"/>
            <rect x="343" y="245" width="16" height="55" rx="4" fill="#2c3e50"/>
            <!-- label -->
            <text x="360" y="115" font-size="9" fill="#333" font-family="sans-serif" font-weight="bold">Sales</text>
            <text x="360" y="126" font-size="9" fill="#333" font-family="sans-serif" font-weight="bold">VP</text>
            <line x1="363" y1="130" x2="350" y2="148" stroke="#666" stroke-width="0.8" stroke-dasharray="3,2"/>

            <!-- Tech Lead (standing, right) -->
            <rect x="420" y="168" width="44" height="78" rx="6" fill="#6c757d"/>
            <!-- crossed arms -->
            <path d="M418 200 Q430 210 442 200 Q454 190 464 200" stroke="#555" stroke-width="7" fill="none" stroke-linecap="round"/>
            <!-- head -->
            <circle cx="442" cy="150" r="19" fill="#f0c8a0"/>
            <!-- hair -->
            <ellipse cx="442" cy="136" rx="19" ry="9" fill="#222"/>
            <!-- legs -->
            <rect x="423" y="246" width="15" height="55" rx="4" fill="#343a40"/>
            <rect x="442" y="246" width="15" height="55" rx="4" fill="#343a40"/>
            <!-- label -->
            <text x="463" y="115" font-size="9" fill="#333" font-family="sans-serif" font-weight="bold">Tech</text>
            <text x="463" y="126" font-size="9" fill="#333" font-family="sans-serif" font-weight="bold">Lead</text>
            <line x1="466" y1="130" x2="450" y2="148" stroke="#666" stroke-width="0.8" stroke-dasharray="3,2"/>
          </svg>
        </div>
        <div class="nav-arrow right" id="next-btn">&#8250;</div>
      </div>

      <!-- Right: situation description -->
      <div class="situation-panel">
        <h2 class="situation-heading">SITUATION:</h2>
        <ul class="situation-list" id="situation-list">
          <!-- filled by JS -->
        </ul>
      </div>
    </div>

    <!-- Bottom: answer area -->
    <div class="answer-area">
      <label class="answer-label">your response or answer</label>
      <div class="bullet-field" id="bullet-field">
        <!-- bullet rows injected by JS -->
      </div>
    </div>

    <!-- Navigation -->
    <div class="bottom-nav">
      <button class="btn-secondary" onclick="history.back()">← Back</button>
      <button class="btn-primary" id="submit-answer-btn">Submit Answer →</button>
    </div>

  </div>

  <script src="scenario.js"></script>
</body>
</html>
